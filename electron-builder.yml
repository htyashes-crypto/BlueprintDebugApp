appId: com.actframework.blueprint-debug-app
productName: BlueprintDebug
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - package.json
  - "!**/*.{md,map,ts}"
  # 不要写 "!node_modules/**/*" —— electron-builder 默认会把 production dependencies
  # 自动打进 app.asar；显式排除 node_modules 会让运行时 require('electron-updater') 失败

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: BlueprintDebug
  uninstallDisplayName: BlueprintDebug ${version}
  createDesktopShortcut: true
  createStartMenuShortcut: true
  artifactName: BlueprintDebug-Setup-${version}-${arch}.${ext}

portable:
  artifactName: BlueprintDebug-Portable-${version}-${arch}.${ext}

mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  category: public.app-category.developer-tools
  artifactName: BlueprintDebug-${version}-${arch}.${ext}

dmg:
  title: BlueprintDebug ${version}
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Phase 6 — GitHub 自动更新；token 通过本地 GH_TOKEN 环境变量提供，绝不进文件
publish:
  provider: github
  owner: htyashes-crypto
  repo: BlueprintDebugApp
  releaseType: release
