<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0098ff"/>
      <stop offset="100%" stop-color="#0066cc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ec9b0"/>
      <stop offset="100%" stop-color="#0098ff"/>
    </linearGradient>
  </defs>

  <!-- 圆角方形底 -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- 角标小绿点（呼应"已连接"指示） -->
  <circle cx="396" cy="116" r="36" fill="#4ec9b0" stroke="#1e1e1e" stroke-width="6"/>

  <!-- 主体字母 B -->
  <text x="256" y="356" font-family="'Segoe UI', 'PingFang SC', 'SF Pro Display', sans-serif"
        font-size="320" font-weight="800" text-anchor="middle" fill="#ffffff"
        letter-spacing="-12">B</text>

  <!-- 底部装饰：四个方块象征日志节点 -->
  <g transform="translate(150, 432)">
    <rect width="40" height="14" rx="4" fill="#ffffff" opacity="0.95"/>
    <rect x="56" width="40" height="14" rx="4" fill="#ffffff" opacity="0.7"/>
    <rect x="112" width="40" height="14" rx="4" fill="#ffffff" opacity="0.5"/>
    <rect x="168" width="40" height="14" rx="4" fill="#ffd700" opacity="0.85"/>
  </g>
</svg>
