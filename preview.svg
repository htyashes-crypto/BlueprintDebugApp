<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1220 820" width="1220" height="820">
  <style>
    text { font-family: 'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif; }
